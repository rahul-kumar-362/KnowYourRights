# Local dev infrastructure for KnowYourRights.
# Start: npm run infra:up   ·   Stop: npm run infra:down
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyr
      POSTGRES_PASSWORD: kyr
      POSTGRES_DB: kyr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_data:
  redis_data:
  postgres_data:
